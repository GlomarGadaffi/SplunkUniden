# Interval = 0 means Splunk runs the script continuously and restarts it if it exits.
# The script's internal reconnect loop handles transient serial failures before
# Splunk ever sees an exit — but Splunk's restart behavior is the backstop.
[script://./bin/bcd325p2_stream.py]
disabled = false
interval = 0
sourcetype = uniden:bcd325p2:glg
index = main
