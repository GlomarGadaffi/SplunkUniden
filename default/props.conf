[uniden:bcd325p2:glg]
# Each line from bcd325p2_stream.py is a complete JSON event.
# INDEXED_EXTRACTIONS=json promotes all top-level keys to indexed fields at ingest.
# KV_MODE=none prevents Splunk from doing redundant extraction on already-structured data.
DATETIME_CONFIG = CURRENT
INDEXED_EXTRACTIONS = json
KV_MODE = none
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
category = Custom
description = Uniden BCD325P2 GLG serial stream — structured RF telemetry
